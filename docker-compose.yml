version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-dealfinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis Database
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Scraper Worker (CHỦ NHÀ - sở hữu Chrome + Proxy + Mạng)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "rm -f /app/shopee_user_profile/SingletonLock /app/shopee_user_profile/SingletonCookie /app/shopee_user_profile/SingletonSocket; chromium --headless=new --remote-debugging-port=9222 --remote-allow-origins=* --no-sandbox --disable-gpu --disable-dev-shm-usage --user-data-dir=/app/shopee_user_profile & python3 /app/proxy.py & npm run start:worker"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      - USE_REDIS_MOCK=false
      - NODE_ENV=production
    ports:
      - "4000:4000"   # API port (backend chạy chung mạng nên mở ở đây)
      - "9222:9222"   # Chrome DevTools (Internal)
      - "9223:9223"   # Proxy cho SSH Inspect từ Windows
    volumes:
      - shopee_profile:/app/shopee_user_profile
      - ./proxy.py:/app/proxy.py
    depends_on:
      - redis
      - postgres
    restart: always

  # API Server Backend (KHÁCH - ở nhờ mạng của Worker)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # CHIÊU CUỐI: Dùng chung mạng với worker → 127.0.0.1:9222 = Chrome
    network_mode: "service:worker"
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      - USE_REDIS_MOCK=false
      - NODE_ENV=production
      - SCRAPER_BROWSER_HOST=127.0.0.1
      - SCRAPER_BROWSER_PORT=9222
    volumes:
      - shopee_profile:/app/shopee_user_profile
    depends_on:
      - worker
    restart: always

  # Web Server (Reverse Proxy + Auto SSL)
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_NAME=${PRODUCTION_DOMAIN:-yourdomain.com}
    depends_on:
      - worker

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_data:
  shopee_profile:
