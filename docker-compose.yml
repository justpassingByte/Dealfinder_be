version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-dealfinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis Database
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Scraper Worker (Chrome + Proxy + Worker)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    # Chrome: Anti-detection + HD + Mở cửa mạng Docker
    command: bash -c "rm -f /app/shopee_user_profile/SingletonLock /app/shopee_user_profile/SingletonCookie /app/shopee_user_profile/SingletonSocket; chromium --headless=new --remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --remote-allow-origins=* --no-sandbox --disable-gpu --disable-dev-shm-usage --window-size=1920,1080 --disable-blink-features=AutomationControlled --user-agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' --user-data-dir=/app/shopee_user_profile & python3 /app/proxy.py & npm run start:worker"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      - USE_REDIS_MOCK=false
      - NODE_ENV=production
    ports:
      - "9222:9222"
      - "9223:9223"
    volumes:
      - shopee_profile:/app/shopee_user_profile
      - ./proxy.py:/app/proxy.py
    depends_on:
      - redis
      - postgres
    restart: always

  # API Server Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      - USE_REDIS_MOCK=false
      - NODE_ENV=production
      - SCRAPER_BROWSER_HOST=worker
      - SCRAPER_BROWSER_PORT=9222
    ports:
      - "4000:4000"
    volumes:
      - shopee_profile:/app/shopee_user_profile
    depends_on:
      - redis
      - postgres
      - worker
    restart: always

  # Web Server (Reverse Proxy + Auto SSL)
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_NAME=${PRODUCTION_DOMAIN:-yourdomain.com}
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_data:
  shopee_profile:
