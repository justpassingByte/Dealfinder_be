x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  command: >
    bash -c "
      rm -f /app/shopee_user_profile/SingletonLock
           /app/shopee_user_profile/SingletonCookie
           /app/shopee_user_profile/SingletonSocket;
      chromium --headless=new
        --remote-debugging-address=0.0.0.0
        --remote-debugging-port=9222
        --remote-allow-origins=*
        --no-sandbox
        --disable-gpu
        --disable-dev-shm-usage
        --window-size=1920,1080
        --disable-blink-features=AutomationControlled
        --user-agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
        --user-data-dir=/app/shopee_user_profile &
      npm run start:worker
    "
  env_file:
    - .env
  environment:
    REDIS_HOST: redis
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
    USE_REDIS_MOCK: "false"
    NODE_ENV: production
  restart: unless-stopped
  depends_on:
    - redis
    - postgres

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-dealfinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis Database
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # ── Scraper Workers ──────────────────────────────────
  # To add a 3rd worker: copy worker-2 block, rename to worker-3,
  # change SCRAPER_WORKER_ID, profile path (_3), and host port (9224).

  worker-1:
    <<: *worker-base
    container_name: backend-worker-1
    environment:
      SCRAPER_WORKER_ID: worker-1
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      USE_REDIS_MOCK: "false"
      NODE_ENV: production
    volumes:
      - ./shopee_user_profile_1:/app/shopee_user_profile
    ports:
      - "127.0.0.1:9222:9222"

  worker-2:
    <<: *worker-base
    container_name: backend-worker-2
    environment:
      SCRAPER_WORKER_ID: worker-2
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      USE_REDIS_MOCK: "false"
      NODE_ENV: production
    volumes:
      - ./shopee_user_profile_2:/app/shopee_user_profile
    ports:
      - "127.0.0.1:9223:9222"

  # API Server Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-dealfinder}
      - USE_REDIS_MOCK=false
      - NODE_ENV=production
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - postgres
      - worker-1
      - worker-2
    restart: always

  # Web Server (Reverse Proxy + Auto SSL)
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_NAME=${PRODUCTION_DOMAIN:-yourdomain.com}
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_data:
